<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lighting — Login</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0a0a;
      --surface: #141414;
      --border: #2a2a2a;
      --groove: #0d0d0d;
      --accent: #e8a020;
      --text: #d0d0d0;
      --muted: #555;
      --danger: #c0392b;
    }
    html, body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', system-ui, -apple-system, sans-serif;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 32px;
      width: 100%;
      max-width: 320px;
    }
    h1 {
      font-family: 'JetBrains Mono', monospace;
      font-size: 1rem;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      text-align: center;
      margin-bottom: 24px;
    }
    label {
      display: block;
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
      margin-bottom: 6px;
    }
    input[type="text"],
    input[type="password"] {
      display: block;
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: var(--groove);
      color: var(--text);
      font-family: inherit;
      font-size: 1rem;
      margin-bottom: 16px;
      outline: none;
    }
    input:focus {
      border-color: var(--accent);
    }
    button {
      display: block;
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 4px;
      background: var(--accent);
      color: #0a0a0a;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
    }
    button:active {
      opacity: 0.8;
    }
    .error {
      background: rgba(192,57,43,0.15);
      border: 1px solid var(--danger);
      border-radius: 4px;
      padding: 8px 12px;
      margin-bottom: 16px;
      font-size: 0.8rem;
      color: var(--danger);
    }
  </style>
</head>
<body>
  <div class="login-box">
    <h1>Lighting</h1>
    <form method="POST" action="/login" autocomplete="on">
      {% if error %}
        <div class="error">{{ error }}</div>
      {% endif %}
      <label for="username">Username</label>
      <input type="text" id="username" name="username" autocomplete="username" required autofocus>
      <label for="password">Password</label>
      <input type="password" id="password" name="password" autocomplete="current-password" required>
      <button type="submit">Sign In</button>
    </form>
  </div>
</body>
</html>
